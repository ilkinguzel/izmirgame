<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek İzmirli misin?</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
padding:40px;
}

h1{
color:#ff4444;
}

button{
padding:12px 22px;

}

button:hover{
background:#444;
}

margin-top:30px;

}

</style>
</head>

<body>

<h1>Gerçek İzmirli misin?</h1>

<div id="quiz"></div>
<div id="result"></div>

<script>

let allQuestions = [

{q:"35 plaka hangi şehir?",answers:["İstanbul","İzmir","Antalya","Bursa"],correct:1},
{q:"İzmir'de simide ne denir?",answers:["Simit","Gevrek","Halka","Çıtır"],correct:1},
{q:"İzmir Saat Kulesi nerede?",answers:["Konak","Alsancak","Buca","Bornova"],correct:0},
{q:"Kordon hangi ilçede?",answers:["Konak","Buca","Bornova","Karabağlar"],correct:0},
{q:"Boyoz genelde neyle yenir?",answers:["Peynir","Yumurta","Zeytin","Domates"],correct:1},
{q:"İzmir'in meşhur sandviçi?",answers:["Kumru","Tost","Döner","Bazlama"],correct:0},
{q:"Gündoğdu Meydanı nerede?",answers:["Karşıyaka","Konak","Bornova","Çeşme"],correct:1},
{q:"Asansör hangi semtte?",answers:["Karataş","Buca","Bornova","Foça"],correct:0},
{q:"Karşıyaka hangi yakada?",answers:["Kuzey","Güney","Doğu","Batı"],correct:0},
{q:"İzmir Fuarı hangi parkta?",answers:["Kültürpark","Gençlik Parkı","Seğmenler","Yıldız"],correct:0},

{q:"Çeşme neyiyle ünlü?",answers:["Rüzgar","Kayak","Orman","Şelale"],correct:0},
{q:"Foça hangi özelliğiyle bilinir?",answers:["Foklar","Kaplıca","Kayak","Volkan"],correct:0},
{q:"İzmir hangi bölgede?",answers:["Ege","Akdeniz","Marmara","Karadeniz"],correct:0},
{q:"Alsancak hangi ilçede?",answers:["Konak","Karşıyaka","Buca","Bornova"],correct:0},
{q:"Kumru genelde hangi ekmekle yapılır?",answers:["Susamlı","Lavaş","Bazlama","Kepek"],correct:0}

]

// Soruları karıştır
allQuestions.sort(()=>Math.random()-0.5)

// İlk 10 soruyu seç
let questions = allQuestions.slice(0,10)

let current = 0
let score = 0

function showQuestion(){

let q = questions[current]

let html = "<h2>"+(current+1)+"/10 - "+q.q+"</h2>"

q.answers.forEach((a,i)=>{
html += `<button onclick="answer(${i})">${a}</button><br>`
})

document.getElementById("quiz").innerHTML = html

}

function answer(i){

if(i == questions[current].correct){
score++
}

current++

if(current < questions.length){
showQuestion()
}else{

let text=""

if(score>=9) text="🔥 Gerçek İzmirli!"
else if(score>=7) text="😎 İzmir ruhu var."
else if(score>=5) text="🙂 Yarı İzmirli."
else text="😂 İzmir'e biraz daha gelmen lazım."

document.getElementById("quiz").innerHTML=""
document.getElementById("result").innerHTML="Sonuç: "+score+"/10<br>"+text

}

}

showQuestion()

</script>

</body>
</html>
