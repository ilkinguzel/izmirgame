<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Ne Kadar İzmirlisin?</title>
<style>
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    color: white;
    background: linear-gradient(to bottom, #ff4d4d, #cc0000);
    position: relative;
    overflow-x: hidden;
}
body::before {
    content: "";
    position: fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: rgba(0,0,0,0.3);
    z-index: -1;
}
h1 {
    color: #FFD700;
    font-size: 38px;
    text-shadow: 2px 2px 6px black;
    animation: bounce 1s ease infinite;
}
@keyframes bounce {0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); }}

#quiz { background: rgba(0,0,0,0.6); padding: 30px; border-radius: 20px; max-width: 500px; width: 90%; margin-top: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }

button.answer { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; background: #222; color: white; transition: transform 0.2s, background 0.2s, color 0.2s; }
button.answer:hover { transform: scale(1.08); background: #444; }

.correct { background: linear-gradient(90deg, #00ff00, #66ff66) !important; color: black; animation: pop 0.3s; }
.wrong { background: linear-gradient(90deg, #ff4d4d, #ff0000) !important; animation: shake 0.5s; }

@keyframes shake {0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); }}
@keyframes pop {0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); }}

#score { margin-top: 15px; font-size: 22px; background: #FFD700; color: black; padding: 10px 25px; border-radius: 20px; transition: transform 0.3s, box-shadow 0.3s; }
#score:hover { box-shadow: 0 0 15px rgba(255, 255, 0, 0.7); transform: scale(1.02); }

#progressContainer { width: 90%; max-width: 500px; height: 18px; background: rgba(255,255,255,0.3); border-radius: 10px; margin-top: 10px; overflow: hidden; }
#progressBar { height: 100%; width: 0%; background: linear-gradient(90deg, lime, green); transition: width 0.6s ease-in-out; }

#retryBtn { margin-top: 20px; padding: 12px 30px; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; background: white; color: black; transition: transform 0.2s, background 0.2s; }
#retryBtn:hover { transform: scale(1.05); background: #ffcc00; }

.confetti { position: fixed; width: 5px; height: 5px; top: 0; opacity: 1; pointer-events: none; z-index: 9999; }
@keyframes fall { 0% { transform: translateY(0) rotate(0deg); opacity:1; } 100% { transform: translateY(600px) rotate(360deg); opacity:0; } }
</style>
</head>
<body>

<h1>Ne Kadar İzmirlisin?</h1>
<div id="score">0 doğru</div>
<div id="progressContainer"><div id="progressBar"></div></div>
<div id="quiz"></div>
<div id="result"></div>
<button id="retryBtn" style="display:none" onclick="restartGame()">Tekrar Oyna</button>

<script>
// --- 36 soruluk güncellenmiş havuz ---
let allQuestions = [
  {q:"35 plaka hangi şehir?",answers:["İstanbul","İzmir","Antalya","Bursa"],correct:1},
  {q:"İzmir'de simide ne denir?",answers:["Simit","Gevrek","Halka","Çıtır"],correct:1},
  {q:"İzmir Saat Kulesi nerede?",answers:["Konak","Alsancak","Buca","Bornova"],correct:0},
  {q:"Kordon hangi ilçede?",answers:["Konak","Buca","Bornova","Karabağlar"],correct:0},
  {q:"Boyoz genelde neyle yenir?",answers:["Peynir","Yumurta","Zeytin","Domates"],correct:2},
  {q:"İzmir'in meşhur sandviçi?",answers:["Kumru","Tost","Döner","Bazlama"],correct:0},
  {q:"Gündoğdu Meydanı nerede?",answers:["Karşıyaka","Konak","Bornova","Çeşme"],correct:1},
  {q:"Asansör hangi semtte?",answers:["Karataş","Buca","Bornova","Foça"],correct:0},
  {q:"Karşıyaka hangi yakada?",answers:["Kuzey","Güney","Doğu","Batı"],correct:0},
  {q:"İzmir Fuarı hangi parkta?",answers:["Kültürpark","Gençlik Parkı","Seğmenler","Yıldız"],correct:0},
  {q:"Alsancak hangi semtte?",answers:["Konak","Buca","Karşıyaka","Bornova"],correct:0},
  {q:"İzmir'in meşhur deniz kenarı sokağı?",answers:["Kordon","İstiklal","Bağdat","Atatürk"],correct:0},
  {q:"İzmir'in simgesi olan saat kulesi hangi yıl yapılmış?",answers:["1901","1907","1910","1923"],correct:1},
  {q:"Çeşme hangi ilçeye bağlı?",answers:["Karşıyaka","Konak","Çeşme","Bornova"],correct:2},
  {q:"İzmir hangi denize kıyısı vardır?",answers:["Ege","Akdeniz","Marmara","Karadeniz"],correct:0},
  {q:"İzmir'in sembolü olan kuş hangisidir?",answers:["Martı","Güvercin","Serçe","Karga"],correct:0},
  {q:"Karşıyaka'nın rengi hangi renktir?",answers:["Kırmızı","Siyah","Mavi","Yeşil"],correct:2},
  {q:"İzmir Limanı hangi ilçe sınırındadır?",answers:["Karşıyaka","Konak","Buca","Bornova"],correct:1},
  {q:"İzmir hangi yıl deprem yaşamıştır?",answers:["1925","1939","1970","1999"],correct:3},
  {q:"İzmir'in meşhur pazarı?",answers:["Kemeralti","Kapalıçarşı","Mısır Çarşısı","Grand Bazaar"],correct:0},
  {q:"İzmir'in en ünlü festivali?",answers:["İzmir Fuarı","İzmir Kısa Film Festivali","İzmir Uluslararası Fuarı","İzmir Jazz Festivali"],correct:2},
  {q:"İzmir hangi bölgede yer alır?",answers:["Marmara","Ege","Akdeniz","Karadeniz"],correct:1},
  {q:"İzmir'in meşhur sokak lezzeti?",answers:["Kokoreç","Gevrek","Tavuk Döner","Lahmacun"],correct:1},
  {q:"İzmir'in en uzun sahili hangi ilçededir?",answers:["Konak","Çeşme","Karşıyaka","Bostanlı"],correct:1},
  {q:"İzmir'in en ünlü yalı semti?",answers:["Alsancak","Karşıyaka","Göztepe","Bostanlı"],correct:0},
  {q:"İzmir hangi dağlarla çevrilidir?",answers:["Kazdağları","Bozdağlar","Toroslar","Uludağ"],correct:1},
  {q:"İzmir'in meşhur simidi hangi isimle anılır?",answers:["Simit","Gevrek","Açma","Poğaça"],correct:1},
  {q:"İzmir hangi liman kenti ile ünlüdür?",answers:["İstanbul","Mersin","İzmir","Trabzon"],correct:2},
  {q:"İzmir hangi tarihte işgalden kurtulmuştur?",answers:["1918","1920","1922","1923"],correct:2},
  {q:"İzmir'in en ünlü parkı?",answers:["Kültürpark","Göztepe Parkı","İnciraltı","Bostanlı"],correct:0},
  {q:"İzmir'in meşhur çarşısı?",answers:["Kemeralti","Kapalıçarşı","Kadıköy Çarşı","Karşıyaka Çarşı"],correct:0},
  {q:"İzmir'in ünlü köprüsü hangisidir?",answers:["Atatürk Köprüsü","Göztepe Köprüsü","Asansör","Bostanlı Köprüsü"],correct:2},
  {q:"İzmir'in meşhur kahvaltısı nedir?",answers:["Boyoz","Simit","Poğaça","Menemen"],correct:3},
  {q:"İzmir hangi körfeze sahiptir?",answers:["İzmit Körfezi","İzmir Körfezi","Marmara Körfezi","Fethiye Körfezi"],correct:1},
  {q:"İzmir hangi komşu illere sahiptir?",answers:["Aydın ve Manisa","İstanbul ve Bursa","Antalya ve Muğla","Balıkesir ve Çanakkale"],correct:0},
  {q:"İzmir'in tarihi limanı hangisidir?",answers:["Alsancak Limanı","Küçük Liman","Göztepe Limanı","Foça Limanı"],correct:1},
  {q:"İzmir'in meşhur semt pazarı hangisidir?",answers:["Kemeraltı","Alsancak","Bornova","Karşıyaka"],correct:0},
  {q:"İzmir'in sembol yapısı nedir?",answers:["Saat Kulesi","Asansör","Kordon","Konak"],correct:0},
  {q:"İzmir'de hangi spor kulübü meşhurdur?",answers:["Fenerbahçe","Beşiktaş","Göztepe","Galatasaray"],correct:2}
];

let remainingQuestions = [];
let current = 0;
let score = 0;

function startGame(){
    remainingQuestions = [...allQuestions];
    current = 0;
    score = 0;
    document.getElementById("score").innerText = "0 doğru";
    document.getElementById("result").innerHTML = "";
    document.getElementById("progressBar").style.width = "0%";
    document.getElementById("retryBtn").style.display = "none";
    showQuestion();
}

function showQuestion(){
    if(current >= 10 || remainingQuestions.length===0){
        showResult();
        return;
    }

    let idx = Math.floor(Math.random()*remainingQuestions.length);
    let q = remainingQuestions.splice(idx,1)[0];

    let shuffledAnswers = [...q.answers].sort(()=>Math.random()-0.5);
    let correctIndex = shuffledAnswers.indexOf(q.answers[q.correct]);

    let html = "<h2>"+(current+1)+". Soru</h2><p>"+q.q+"</p>";
    shuffledAnswers.forEach((a,i)=>{
        html+=`<button class="answer" onclick="answer(${i}, ${correctIndex})">${a}</button>`;
    });
    document.getElementById("quiz").innerHTML = html;
}

function answer(i, correctIndex){
    let buttons = document.querySelectorAll(".answer");
    buttons.forEach(b=>b.disabled=true);

    if(i===correctIndex){
        score++;
        buttons[i].classList.add("correct");
        confetti();
    } else {
        buttons[i].classList.add("wrong");
        buttons[correctIndex].classList.add("correct");
    }

    document.getElementById("score").innerText = score+" doğru";
    current++;
    document.getElementById("progressBar").style.width = (current/10*100)+"%";

    setTimeout(showQuestion, 1000);
}

function showResult(){
    document.getElementById("quiz").innerHTML="";
    let text="", emoji="";
    if(score==10){ text="Yuh gala! Gerçek bir İzmirlisin "; emoji="🏆🎉"; }
    else if(score==9){ text="Yuh gala! Hepsini bilmeye çok yaklaşmıştın "; emoji="🎖️"; }
    else if(score==8){ text="İzmir ruhu sende var."; emoji="🌟"; }
    else if(score==7){ text="Kordon’da birkaç tur daha atman lazım."; emoji="⛵"; }
    else if(score==6){ text="Boyozla yeni yeni tanışmış gibisin."; emoji="🥯"; }
    else if(score==5){ text="Gevrek seviyesine gelmişsin."; emoji="🥨"; }
    else if(score==4){ text="İzmir’e tatil yapmaya gelmiş gibisin."; emoji="🏖️"; }
    else if(score==3){ text="Biraz daha İzmir havası alman lazım."; emoji="🌬️"; }
    else if(score==2){ text="Galiba yanlış şehirdesin."; emoji="❌"; }
    else if(score==1){ text="İzmir seni bekliyor."; emoji="🛵"; }
    else{ text="Sivaslı mısın gardaş ?"; emoji="😅"; }

    document.getElementById("result").innerHTML=`
        <div style="
            text-align:center; 
            font-size: 26px; 
            padding: 25px; 
            border-radius: 20px; 
            background: linear-gradient(135deg, #FFD700, #FFC107);
            color: black; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        ">
            <div style="font-size:50px; margin-bottom:15px;">${emoji}</div>
            <div>Sonuç: <strong>${score}/10</strong></div>
            <div style="margin-top:10px; font-size:20px;">${text}</div>
        </div>
    `;
    document.getElementById("retryBtn").style.display="block";
}

function restartGame(){ startGame(); }

function confetti(){
    for(let i=0;i<40;i++){
        let c=document.createElement("div");
        c.className="confetti";
        let size = 5 + Math.random()*10;
        c.style.width = size + "px";
        c.style.height = size + "px";
        c.style.left = Math.random()*window.innerWidth + "px";
        c.style.background = ["yellow","white","blue","pink","orange","lime"][Math.floor(Math.random()*6)];
        let duration = 800 + Math.random()*700;
        let rotate = Math.random()*360;
        let xShift = (Math.random()-0.5)*200;
        c.animate([{ transform: `translate(0px,0px) rotate(${rotate}deg)` },{ transform: `translate(${xShift}px,600px) rotate(${rotate+360}deg)` }], { duration: duration, easing: 'linear', fill: 'forwards' });
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), duration);
    }
}

window.onload = startGame;
</script>
</body>
</html>
