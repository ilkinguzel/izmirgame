<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek İzmirli misin?</title>

<style>
body{
font-family:Segoe UI,Tahoma;
background:red;
color:white;
text-align:center;
margin:0;
padding:20px;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
}

h1{
color:#FFD700;
font-size:38px;
text-shadow:2px 2px 6px black;
}

#quiz{
background:rgba(0,0,0,0.6);
padding:30px;
border-radius:20px;
max-width:500px;
width:90%;
margin-top:20px;
}

button.answer{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
background:#222;
color:white;
}

button.answer:hover{
transform:scale(1.05);
}

.correct{background:limegreen!important;color:black;}
.wrong{background:red!important;}

#score{
margin-top:15px;
font-size:22px;
background:#FFD700;
color:black;
padding:8px 20px;
border-radius:20px;
}

#progressContainer{
width:90%;
max-width:500px;
height:18px;
background:rgba(255,255,255,0.3);
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

#progressBar{
height:100%;
width:0%;
background:lime;
transition:width .4s;
}

#result{
margin-top:20px;
font-size:22px;
background:#FFD700;
color:black;
padding:20px;
border-radius:20px;
}

#retryBtn{
margin-top:20px;
padding:12px 30px;
border:none;
border-radius:25px;
font-size:18px;
cursor:pointer;
background:white;
}

.confetti{
position:fixed;
width:8px;
height:8px;
top:0;
animation:fall 1s linear forwards;
}

@keyframes fall{
0%{transform:translateY(0)}
100%{transform:translateY(600px) rotate(360deg);opacity:0}
}
</style>
</head>

<body>

<h1>Gerçek İzmirli misin?</h1>

<div id="score">0 doğru</div>

<div id="progressContainer">
<div id="progressBar"></div>
</div>

<div id="quiz"></div>

<div id="result"></div>

<button id="retryBtn" style="display:none" onclick="restartGame()">Tekrar Oyna</button>

<script>

let allQuestions=[
{q:"35 plaka hangi şehir?",answers:["İstanbul","İzmir","Antalya","Bursa"],correct:1},
{q:"İzmir'de simide ne denir?",answers:["Simit","Gevrek","Halka","Çıtır"],correct:1},
{q:"İzmir Saat Kulesi nerede?",answers:["Konak","Alsancak","Buca","Bornova"],correct:0},
{q:"Kordon hangi ilçede?",answers:["Konak","Buca","Bornova","Karabağlar"],correct:0},
{q:"Boyoz genelde neyle yenir?",answers:["Peynir","Yumurta","Zeytin","Domates"],correct:2},
{q:"İzmir'in meşhur sandviçi?",answers:["Kumru","Tost","Döner","Bazlama"],correct:0},
{q:"Gündoğdu Meydanı nerede?",answers:["Karşıyaka","Konak","Bornova","Çeşme"],correct:1},
{q:"Asansör hangi semtte?",answers:["Karataş","Buca","Bornova","Foça"],correct:0},
{q:"Karşıyaka hangi yakada?",answers:["Kuzey","Güney","Doğu","Batı"],correct:0},
{q:"İzmir Fuarı hangi parkta?",answers:["Kültürpark","Gençlik Parkı","Seğmenler","Yıldız"],correct:0},
{q:"İzmir'in meşhur tatlısı?",answers:["Şambaba","Lokma","Tulumba","Baklava"],correct:0},
{q:"İncirliova hangi bölgede?",answers:["Ege","Marmara","Akdeniz","Karadeniz"],correct:0},
{q:"İzmir'in meşhur deniz ürünleri pazarı?",answers:["Kemeraltı","Balık Pazarı","Konak","Alsancak"],correct:1},
{q:"İzmir'in meşhur çarşısı?",answers:["Kemeraltı","Alsancak","Konak","Bornova"],correct:0},
{q:"İzmir hangi deniz kıyısında?",answers:["Ege","Marmara","Akdeniz","Karadeniz"],correct:0},
{q:"İzmir’in belediye başkenti?",answers:["Konak","Karşıyaka","Bornova","İzmir"],correct:3},
{q:"İzmir’in tarihi limanı?",answers:["Alsancak Limanı","Konak Limanı","Karşıyaka Limanı","Foça Limanı"],correct:1},
{q:"İzmir’in popüler caddesi?",answers:["İnciraltı","Atatürk Caddesi","Kıbrıs Şehitleri","Gazi Bulvarı"],correct:1},
{q:"İzmir’in meşhur kahvaltısı?",answers:["Boyoz ve çay","Simit ve çay","Kumru ve peynir","Gevrek ve zeytin"],correct:0},
{q:"İzmir’in meşhur deniz festivali?",answers:["İEF","Çeşme Festivali","Kordon Festivali","Foça Festivali"],correct:0},
{q:"İzmir’de meşhur çiçek pazarı?",answers:["Güzelyalı","Bostanlı","Kemeraltı","Alsancak"],correct:2},
{q:"İzmir’in meşhur manzarası?",answers:["Kordon","Saat Kulesi","Asansör","Konak"],correct:0},
{q:"İzmir’in ünlü semti?",answers:["Bornova","Alsancak","Buca","Karşıyaka"],correct:1},
{q:"İzmir’in deniz otobüsü durağı?",answers:["Konak","Karşıyaka","Bostanlı","Foça"],correct:0},
{q:"İzmir’in meşhur plajı?",answers:["Çeşme","Foça","Urla","Seferihisar"],correct:0},
{q:"İzmir’in popüler gezi alanı?",answers:["Konak Pier","Alsancak","Kordon","Kültürpark"],correct:2},
{q:"İzmir’in ünlü köprüsü?",answers:["Asansör Köprüsü","Konak Köprüsü","Göztepe Köprüsü","Bostanlı Köprüsü"],correct:0},
{q:"İzmir’in en kalabalık ilçesi?",answers:["Konak","Karşıyaka","Bornova","Buca"],correct:0},
{q:"İzmir’in meşhur gece hayatı bölgesi?",answers:["Alsancak","Konak","Bostanlı","Güzelyalı"],correct:0},
{q:"İzmir’in en eski çarşısı?",answers:["Kemeraltı","Konak","Alsancak","Bornova"],correct:0},
{q:"İzmir’in en büyük fuar alanı?",answers:["Kültürpark","Gençlik Parkı","Konak Parkı","Alsancak Parkı"],correct:0},
{q:"İzmir’in tarihi camisi?",answers:["Hisar Camii","Saat Kulesi Camii","Kemeraltı Camii","Konak Camii"],correct:0},
{q:"İzmir’in en bilinen festivali?",answers:["İEF","Çeşme Festivali","Kordon Festivali","Foça Festivali"],correct:0},
{q:"İzmir’in ünlü köftecisi?",answers:["Kumrucu Şevki","İzmir Köftecisi","Meşhur Köfteci","Bornova Köftecisi"],correct:0},
{q:"İzmir’in meşhur meydanı?",answers:["Gündoğdu","Kordon","Konak","Alsancak"],correct:2},
{q:"İzmir’in en uzun caddesi?",answers:["Atatürk Caddesi","Kıbrıs Şehitleri","Gazi Bulvarı","İnciraltı"],correct:0},
{q:"İzmir’in ünlü çarşısı?",answers:["Kemeraltı","Alsancak","Bornova","Konak"],correct:0},
{q:"İzmir’in en popüler kahvecisi?",answers:["Kahve Dünyası","Starbucks","Espresso Lab","Kahve Molası"],correct:2},
{q:"İzmir’in ünlü semt pazarı?",answers:["Bostanlı Pazarı","Konak Pazarı","Karşıyaka Pazarı","Alsancak Pazarı"],correct:0},
{q:"İzmir’in meşhur tatlıcısı?",answers:["Şambaba","Tulumba","Baklava","Künefe"],correct:0},
{q:"İzmir’in tarihi yapısı?",answers:["Saat Kulesi","Asansör","Kordon","Konak"],correct:0},
{q:"İzmir’in tarihi meydanı?",answers:["Konak Meydanı","Gündoğdu Meydanı","Kordon Meydanı","Alsancak Meydanı"],correct:0},
{q:"İzmir’in ünlü spor takımı?",answers:["Altay","Göztepe","Karşıyaka","İzmirspor"],correct:1},
{q:"İzmir’in meşhur kahvaltı simidi?",answers:["Gevrek","Simit","Çıtır","Halka"],correct:0},
{q:"İzmir’in popüler tatil beldesi?",answers:["Çeşme","Foça","Urla","Seferihisar"],correct:0},
{q:"İzmir’in ünlü kordon bölgesi?",answers:["Alsancak","Konak","Bostanlı","Kordonaltı"],correct:1},
{q:"İzmir’in en meşhur balıkçısı?",answers:["Balıkçı Mehmet","Kordon Balıkçısı","Alsancak Balıkçısı","Karşıyaka Balıkçısı"],correct:0},
{q:"İzmir’in ünlü çikolata markası?",answers:["Şambaba","Tulumba","Kahve Dünyası","Kordon Çikolata"],correct:3},
{q:"İzmir’in tarihi köprüsü?",answers:["Asansör Köprüsü","Konak Köprüsü","Göztepe Köprüsü","Bostanlı Köprüsü"],correct:0},
{q:"İzmir’in popüler festival mekanı?",answers:["Kültürpark","Alsancak","Konak Pier","Bostanlı"],correct:0},
{q:"İzmir’in en güzel manzarası?",answers:["Saat Kulesi","Kordon","Asansör","Konak"],correct:2}
];

let questions=[];
let current=0;
let score=0;

function startGame(){
questions=[...allQuestions].sort(()=>Math.random()-0.5).slice(0,10);
current=0;
score=0;
showQuestion();
}

function showQuestion(){
let q=questions[current];
let html="<h2>"+(current+1)+". Soru</h2>";
html+="<p>"+q.q+"</p>";

q.answers.forEach((a,i)=>{
html+=`<button class="answer" onclick="answer(${i})">${a}</button>`;
});

document.getElementById("quiz").innerHTML=html;
}

function answer(i){

let q=questions[current];
let buttons=document.querySelectorAll(".answer");

buttons.forEach(b=>b.disabled=true);

if(i===q.correct){
score++;
buttons[i].classList.add("correct");
confetti();
}else{
buttons[i].classList.add("wrong");
buttons[q.correct].classList.add("correct");
}

document.getElementById("score").innerText=score+" doğru";

current++;
updateProgress();

setTimeout(()=>{
if(current<questions.length){
showQuestion();
}else{
showResult();
}
},1000);
}

function updateProgress(){
let pct=(current/questions.length)*100;
document.getElementById("progressBar").style.width=pct+"%";
}

function showResult(){

document.getElementById("quiz").innerHTML="";

let text="";

if(score==10) text="Yuh gala! Gerçek bir İzmirlisin 😄";
else if(score==9) text="Yug gala! Hepsini bilmeye çok yaklaşmıştın 😄";
else if(score==8) text="Az kalsın! İzmir ruhu sende var.";
else if(score==7) text="Kordon’da birkaç tur daha atman lazım.";
else if(score==6) text="Boyozla yeni yeni tanışmış gibisin.";
else if(score==5) text="Gevrek seviyesine gelmişsin.";
else if(score==4) text="İzmir’e tatil yapmaya gelmiş gibisin.";
else if(score==3) text="Biraz daha İzmir havası alman lazım.";
else if(score==2) text="Galiba yanlış şehirdesin.";
else if(score==1) text="İzmir seni bekliyor.";
else text="Hiç mi gevrek yemedin 😄";

document.getElementById("result").innerHTML="Sonuç: "+score+"/10<br>"+text;

document.getElementById("retryBtn").style.display="block";
}

function restartGame(){
document.getElementById("result").innerHTML="";
document.getElementById("retryBtn").style.display="none";
document.getElementById("progressBar").style.width="0%";
document.getElementById("score").innerText="0 doğru";
startGame();
}

function confetti(){
for(let i=0;i<20;i++){
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*window.innerWidth+"px";
c.style.background=["yellow","white","blue","pink"][Math.floor(Math.random()*4)];
document.body.appendChild(c);
setTimeout(()=>c.remove(),1000);
}
}

startGame();

</script>

</body>
</html>
