<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek İzmirli misin?</title>
<style>
/* --- Body ve genel tema --- */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #ff4d4d, #ff9999);
    background-size: 400% 400%;
    color: white;
    text-align: center;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    animation: bgAnimation 15s ease infinite;
}

/* --- Arka plan animasyonu --- */
@keyframes bgAnimation {
    0% {background-position: 0% 50%;}
    50% {background-position: 100% 50%;}
    100% {background-position: 0% 50%;}
}

/* --- Başlık animasyonu --- */
h1 {
    color: #FFD700;
    font-size: 38px;
    text-shadow: 2px 2px 6px black;
    animation: bounce 1s ease infinite;
}
@keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

/* --- Quiz kutusu --- */
#quiz {
    background: rgba(0,0,0,0.6);
    padding: 30px;
    border-radius: 20px;
    max-width: 500px;
    width: 90%;
    margin-top: 20px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

/* --- Butonlar --- */
button.answer {
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border: none;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    background: #222;
    color: white;
    transition: transform 0.2s, background 0.2s, color 0.2s;
}
button.answer:hover {
    transform: scale(1.08);
    background: #444;
}

/* --- Doğru / Yanlış --- */
.correct {
    background: linear-gradient(90deg, #00ff00, #66ff66) !important;
    color: black;
    animation: pop 0.3s;
}
.wrong {
    background: linear-gradient(90deg, #ff4d4d, #ff0000) !important;
    animation: shake 0.5s;
}

/* --- Animasyonlar --- */
@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    75% { transform: translateX(-5px); }
    100% { transform: translateX(0); }
}
@keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.2); }
    100% { transform: scale(1); }
}

/* --- Skor kutusu --- */
#score {
    margin-top: 15px;
    font-size: 22px;
    background: #FFD700;
    color: black;
    padding: 10px 25px;
    border-radius: 20px;
    transition: transform 0.3s, box-shadow 0.3s;
}
#score:hover {
    box-shadow: 0 0 15px rgba(255, 255, 0, 0.7);
    transform: scale(1.02);
}

/* --- Progress bar --- */
#progressContainer {
    width: 90%;
    max-width: 500px;
    height: 18px;
    background: rgba(255,255,255,0.3);
    border-radius: 10px;
    margin-top: 10px;
    overflow: hidden;
}
#progressBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, lime, green);
    transition: width 0.6s ease-in-out;
}

/* --- Sonuç kutusu --- */
#result {
    margin-top: 20px;
    font-size: 22px;
    background: #FFD700;
    color: black;
    padding: 20px;
    border-radius: 20px;
    transition: transform 0.3s, box-shadow 0.3s;
}
#result:hover {
    box-shadow: 0 0 15px rgba(255, 255, 0, 0.7);
    transform: scale(1.02);
}

/* --- Tekrar oynama butonu --- */
#retryBtn {
    margin-top: 20px;
    padding: 12px 30px;
    border: none;
    border-radius: 25px;
    font-size: 18px;
    cursor: pointer;
    background: white;
    color: black;
    transition: transform 0.2s, background 0.2s;
}
#retryBtn:hover {
    transform: scale(1.05);
    background: #ffcc00;
}

/* --- Confetti --- */
.confetti {
    position: fixed;
    width: 5px;
    height: 5px;
    top: 0;
    opacity: 1;
    pointer-events: none;
    z-index: 9999;
}
@keyframes fall {
    0% { transform: translateY(0) rotate(0deg); opacity:1; }
    100% { transform: translateY(600px) rotate(360deg); opacity:0; }
}
</style>
</head>

<body>

<h1>Gerçek İzmirli misin?</h1>

<div id="score">0 doğru</div>

<div id="progressContainer">
    <div id="progressBar"></div>
</div>

<div id="quiz"></div>

<div id="result"></div>

<button id="retryBtn" style="display:none" onclick="restartGame()">Tekrar Oyna</button>

<script>
// --- Soru havuzu ---
let allQuestions=[
{q:"35 plaka hangi şehir?",answers:["İstanbul","İzmir","Antalya","Bursa"],correct:1},
{q:"İzmir'de simide ne denir?",answers:["Simit","Gevrek","Halka","Çıtır"],correct:1},
{q:"İzmir Saat Kulesi nerede?",answers:["Konak","Alsancak","Buca","Bornova"],correct:0},
{q:"Kordon hangi ilçede?",answers:["Konak","Buca","Bornova","Karabağlar"],correct:0},
{q:"Boyoz genelde neyle yenir?",answers:["Peynir","Yumurta","Zeytin","Domates"],correct:2},
{q:"İzmir'in meşhur sandviçi?",answers:["Kumru","Tost","Döner","Bazlama"],correct:0},
{q:"Gündoğdu Meydanı nerede?",answers:["Karşıyaka","Konak","Bornova","Çeşme"],correct:1},
{q:"Asansör hangi semtte?",answers:["Karataş","Buca","Bornova","Foça"],correct:0},
{q:"Karşıyaka hangi yakada?",answers:["Kuzey","Güney","Doğu","Batı"],correct:0},
{q:"İzmir Fuarı hangi parkta?",answers:["Kültürpark","Gençlik Parkı","Seğmenler","Yıldız"],correct:0}
];

// --- Oyun mantığı ---
let questions=[];
let current=0;
let score=0;

function startGame(){
    questions=[...allQuestions].sort(()=>Math.random()-0.5).slice(0,10);
    current=0;
    score=0;
    showQuestion();
    document.getElementById("score").innerText="0 doğru";
    document.getElementById("result").innerHTML="";
    document.getElementById("progressBar").style.width="0%";
    document.getElementById("retryBtn").style.display="none";
}

function showQuestion(){
    let q=questions[current];

    // cevapları karıştır
    let shuffledAnswers = [...q.answers].sort(()=>Math.random()-0.5);

    // doğru cevabın yeni index'ini güncelle
    let newCorrectIndex = shuffledAnswers.indexOf(q.answers[q.correct]);
    q.correct = newCorrectIndex;

    let html = "<h2>"+(current+1)+". Soru</h2><p>"+q.q+"</p>";
    shuffledAnswers.forEach((a,i)=>{
        html+=`<button class="answer" onclick="answer(${i})">${a}</button>`;
    });

    document.getElementById("quiz").innerHTML = html;
}

function answer(i){
    let q=questions[current];
    let buttons=document.querySelectorAll(".answer");
    buttons.forEach(b=>b.disabled=true);

    if(i===q.correct){
        score++;
        buttons[i].classList.add("correct");
        confetti();
    }else{
        buttons[i].classList.add("wrong");
        buttons[q.correct].classList.add("correct");
    }

    document.getElementById("score").innerText=score+" doğru";
    current++;
    updateProgress();

    setTimeout(()=>{
        if(current<questions.length){
            showQuestion();
        }else{
            showResult();
        }
    },1000);
}

function updateProgress(){
    let pct=(current/questions.length)*100;
    document.getElementById("progressBar").style.width=pct+"%";
}

function showResult(){
    document.getElementById("quiz").innerHTML="";
    let text="";
    if(score==10) text="Yuh gala! Gerçek bir İzmirlisin ";
    else if(score==9) text="Hepsini bilmeye çok yaklaşmıştın ";
    else if(score==8) text="Hepsini bilmene az kalmıştı! İzmir ruhu sende var.";
    else if(score==7) text="Kordon’da birkaç tur daha atman lazım.";
    else if(score==6) text="Boyozla yeni yeni tanışmış gibisin.";
    else if(score==5) text="Gevrek seviyesine gelmişsin.";
    else if(score==4) text="İzmir’e tatil yapmaya gelmiş gibisin.";
    else if(score==3) text="Biraz daha İzmir havası alman lazım.";
    else if(score==2) text="Galiba yanlış şehirdesin.";
    else if(score==1) text="İzmir seni bekliyor.";
    else text="Sivaslı mısın gardaş ?";

    document.getElementById("result").innerHTML=`<img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Izmir_Bayrak.png/60px-Izmir_Bayrak.png" style="margin-bottom:10px"><br>Sonuç: ${score}/10<br>${text}`;
    document.getElementById("retryBtn").style.display="block";
}

function restartGame(){
    startGame();
}

// --- Yeni confetti efekti ---
function confetti(){
    for(let i=0;i<40;i++){
        let c=document.createElement("div");
        c.className="confetti";
        let size = 5 + Math.random()*10;
        c.style.width = size + "px";
        c.style.height = size + "px";
        c.style.left = Math.random()*window.innerWidth + "px";
        c.style.background = ["yellow","white","blue","pink","orange","lime"][Math.floor(Math.random()*6)];
        let duration = 800 + Math.random()*700;
        let rotate = Math.random()*360;
        c.style.transform = `rotate(${rotate}deg)`;
        c.style.animation = `fall ${duration}ms linear forwards`;
        let xShift = (Math.random()-0.5)*200;
        c.animate([
            { transform: `translate(0px,0px) rotate(${rotate}deg)` },
            { transform: `translate(${xShift}px,600px) rotate(${rotate+360}deg)` }
        ], {
            duration: duration,
            easing: 'linear',
            fill: 'forwards'
        });
        document.body.appendChild(c);
        setTimeout(()=>c.remove(), duration);
    }
}

startGame();
</script>

</body>
</html>
