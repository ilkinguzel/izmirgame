<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek İzmirli misin?</title>
<style>
/* Genel stil */
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px;
  margin: 0;
  background: linear-gradient(to bottom, #1E90FF, #87CEFA);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
}

h1 {
  font-size: 36px;
  color: #FFD700;
  text-shadow: 2px 2px 4px #000;
  margin-bottom: 20px;
}

#score {
  font-size: 22px;
  background: rgba(255, 223, 0, 0.8);
  color: black;
  display: inline-block;
  padding: 8px 16px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

#quiz button {
  padding: 12px 24px;
  margin: 10px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
  background: #222;
  color: #fff;
  min-width: 200px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

#quiz button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px #fff;
}

.correct {
  background: limegreen !important;
  color: black;
}

.wrong {
  background: red !important;
  color: white;
}

#result {
  margin-top: 30px;
  font-size: 24px;
  color: #FFD700;
  text-shadow: 1px 1px 2px #000;
}

#retryBtn {
  margin-top: 20px;
  padding: 12px 30px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  background: #FFD700;
  color: black;
  font-weight: bold;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  transition: all 0.2s;
}

#retryBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px #fff;
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: #FFD700;
  top: 0;
  left: 50%;
  pointer-events:none;
  animation: fall 1s linear forwards;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(600px) rotate(360deg); opacity: 0; }
}
</style>
</head>
<body>

<h1>Gerçek İzmirli misin?</h1>
<div id="score">0/0</div>
<div id="quiz"></div>
<div id="result"></div>
<button id="retryBtn" style="display:none" onclick="restartGame()">Tekrar Dene</button>

<script>
// 50 soruluk havuz
let allQuestions = [

{q:"Foça hangi özelliğiyle bilinir?",answers:["Foklar","Kaplıca","Kayak","Volkan"],correct:0},
{q:"Alsancak hangi ilçede?",answers:["Konak","Karşıyaka","Buca","Bornova"],correct:0},
{q:"Kumru genelde hangi ekmekle yapılır?",answers:["Susamlı","Lavaş","Bazlama","Kepek"],correct:0},
{q:"İzmir hangi bölgede?",answers:["Ege","Akdeniz","Marmara","Karadeniz"],correct:0},
{q:"İzmir’de meşhur ot festivali hangi ilçede?",answers:["Çeşme","Konak","Karşıyaka","Buca"],correct:0},
{q:"İzmir’de hangi semtte teleferik yoktur?",answers:["Balçova","Bostanlı","Göztepe","Bornova"],correct:1},
{q:"İzmir’in meşhur tatlısı nedir?",answers:["Şambali","Baklava","Künefe","Kazandibi"],correct:0},
{q:"İzmir’de en uzun sahil?",answers:["Kordon","Bostanlı","Çeşme","Alsancak"],correct:0},
{q:"İzmir hangi denize kıyısı vardır?",answers:["Ege","Akdeniz","Marmara","Karadeniz"],correct:0},
{q:"İzmir’in simgesi olan yapı?",answers:["Saat Kulesi","Asansör","Kordon","Kumru"],correct:0},
{q:"İzmir hangi yıl deprem yaşamıştır?",answers:["1999","2020","1974","1928"],correct:2},
{q:"İzmir’in meşhur balığı?",answers:["Levrek","Palamut","Çipura","İstavrit"],correct:3},
{q:"İzmir’de meşhur çarşı?",answers:["Kemeraltı","Mısır Çarşısı","Grand Bazaar","Kapalıçarşı"],correct:0},
{q:"İzmir’in meşhur festivali?",answers:["Enternasyonal Fuar","Film Festivali","Müzik Festivali","Çiçek Festivali"],correct:0},

{q:"İzmir’deki asansör hangi amaçla yapılmış?",answers:["Taşımacılık","Turizm","Resmi İşler","Hiçbiri"],correct:0},
{q:"İzmir’in meşhur rakısı?",answers:["Yeni Rakı","Tekirdağ Rakısı","Efe Rakı","Bütün Rakı"],correct:2},
{q:"İzmir’in ünlü çarşısı nerede?",answers:["Kemeraltı","Alsancak","Bornova","Buca"],correct:0},
{q:"İzmir’deki meşhur tatlıcı?",answers:["Hafız Mustafa","Sakızlı","Şambalici","Kumrucu"],correct:2},
{q:"İzmir’in ünlü kahvesi?",answers:["Kahve Dünyası","Kahveci Hacıbaba","Starbucks","Günaydın"],correct:1},

{q:"İzmir’in en bilinen alışveriş merkezi?",answers:["Forum Bornova","Konak Pier","Mavişehir AVM","Kipa"],correct:0},
{q:"İzmir’in meşhur köprüsü?",answers:["Göztepe Köprüsü","Konak Köprüsü","Asansör Köprüsü","Hiçbiri"],correct:1},
{q:"İzmir’in simgesi olan meydan?",answers:["Konak Meydanı","Kordon","Alsancak Meydanı","Gündoğdu"],correct:0},
{q:"İzmir’deki meşhur plaj?",answers:["Çeşme","Ilıca","Altınkum","Bostanlı"],correct:0},
{q:"İzmir’in ünlü yemekleri?",answers:["Boyoz, Kumru, Çöp Şiş","Lahmacun, Döner, İskender","Kumpir, Hamburger, Pizza","Mantı, Börek, Kuzu Tandır"],correct:0},
{q:"İzmir’in tarihi kalesi?",answers:["Kadifekale","Konak Kalesi","Asansör Kalesi","Hisar"],correct:0},
{q:"İzmir’in ünlü alışveriş caddesi?",answers:["Kıbrıs Şehitleri","İnciraltı","Alsancak","Cumhuriyet"],correct:0},
{q:"İzmir’in ünlü semti?",answers:["Alsancak","Karşıyaka","Bornova","Konak"],correct:0},
{q:"İzmir’in ünlü parkı?",answers:["Kültürpark","Gençlik Parkı","Fuarpark","Yıldız Parkı"],correct:0},
{q:"İzmir’in meşhur pazarı?",answers:["Kemeraltı","Çeşme Pazarı","Alsancak Pazarı","Bostanlı Pazarı"],correct:0},
{q:"İzmir’in ünlü simgesi?",answers:["Saat Kulesi","Kordon","Asansör","Gündoğdu"],correct:0},
{q:"İzmir’in tarihi semti?",answers:["Konak","Alsancak","Karşıyaka","Bostanlı"],correct:0},
{q:"İzmir’in tarihi yapısı?",answers:["Kadifekale","Saat Kulesi","Asansör","Konak"],correct:0},
{q:"İzmir’in ünlü tatlıcısı?",answers:["Şambalici","Hafız Mustafa","Kumrucu","Sakızlı"],correct:1},
{q:"İzmir’in meşhur festivali?",answers:["Enternasyonal Fuar","Film Festivali","Çiçek Festivali","Müzik Festivali"],correct:0},
{q:"İzmir’in meşhur plajı?",answers:["Çeşme","Ilıca","Altınkum","Bostanlı"],correct:0},
{q:"İzmir’in ünlü caddesi?",answers:["Kıbrıs Şehitleri","İnciraltı","Alsancak","Cumhuriyet"],correct:2},
{q:"İzmir’in ünlü semti?",answers:["Alsancak","Karşıyaka","Bornova","Konak"],correct:0},
{q:"İzmir’in ünlü yemeği?",answers:["Boyoz","Kumru","Çöp Şiş","Hepsi"],correct:3}
];

// Rastgele 10 soru seç
function getRandomQuestions() {
  let shuffled = allQuestions.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 10);
}

let questions = getRandomQuestions();
let current = 0;
let score = 0;
let answered = false;

function showQuestion() {
  answered = false;
  let q = questions[current];
  let html = "<h2>"+(current+1)+"/10 - "+q.q+"</h2>";
  q.answers.forEach((a,i)=>{
    html += `<button id="btn${i}" onclick="answer(${i})">${a}</button><br>`;
  });
  document.getElementById("quiz").innerHTML = html;
  document.getElementById("result").innerHTML = "";
}

function answer(i) {
  if(answered) return;
  answered = true;
  let correctIndex = questions[current].correct;
  if(i == correctIndex){
    score++;
    document.getElementById("btn"+i).classList.add("correct");
    showConfetti();
  } else {
    document.getElementById("btn"+i).classList.add("wrong");
    document.getElementById("btn"+correctIndex).classList.add("correct");
  }
  current++;
  document.getElementById("score").innerText = score + "/" + current;
  setTimeout(()=>{
    if(current < questions.length){
      showQuestion();
    } else {
      showResult();
    }
  },1000);
}

function showResult() {
  let text="";
  if(score>=9) text="Mükemmel! Gerçek bir İzmir bilgini.";
  else if(score>=7) text="Çok iyi, İzmir’i iyi tanıyorsun.";
  else if(score>=5) text="Orta seviye, biraz daha çalışabilirsin.";
  else text="Daha fazla bilgiye ihtiyaç var.";
  
  document.getElementById("quiz").innerHTML = "";
  document.getElementById("result").innerHTML = "Sonuç: "+score+"/10<br>"+text;
  document.getElementById("retryBtn").style.display = "inline-block";
}

function restartGame() {
  questions = getRandomQuestions();
  current = 0;
  score = 0;
  document.getElementById("retryBtn").style.display = "none";
  document.getElementById("score").innerText = "0/0";
  showQuestion();
}

// Basit konfeti
function showConfetti(){
  for(let i=0;i<15;i++){
    let c = document.createElement("div")
    c.className="confetti"
    c.style.left = Math.random()*window.innerWidth+"px"
    c.style.background = ["#FFD700","#FF4500","#00BFFF","#FF69B4"][Math.floor(Math.random()*4)]
    document.body.appendChild(c)
    setTimeout(()=>{c.remove()},1200)
  }
}

showQuestion();
</script>
</body>
</html>
