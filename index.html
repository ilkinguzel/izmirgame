<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Izmir Game</title>
<style>
/* --- Genel stil --- */
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  margin: 0; padding: 0;
  color: #fff; text-align: center;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  background: #c0392b; /* Genel kırmızı arka plan */
  transition: background 0.5s;
}
h1 { font-size: 48px; margin: 40px 0; text-shadow: 2px 2px 6px #000; }

/* --- Giriş ekranı butonları --- */
#menu button {
  padding: 20px 40px;
  font-size: 24px;
  margin: 15px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  color: #fff;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  transition: all 0.3s;
}
#menu button:hover { transform: scale(1.05); box-shadow: 0 0 15px #fff; }
#btn1 { background:#2980b9; } /* Quiz */
#btn2 { background:#27ae60; } /* Harita */
#btn3 { background:#f39c12; } /* Bilgi kartı */

/* --- Genel oyun kart stili --- */
#gameContainer {
  background: rgba(0,0,0,0.6);
  padding: 25px 30px;
  border-radius: 20px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.7);
  width: 90%;
  max-width: 600px;
  margin-bottom: 20px;
  position: relative;
}

/* --- Quiz Butonları --- */
#quiz button {
  padding: 12px 20px;
  margin: 10px 0;
  width: 100%;
  border: none;
  border-radius: 15px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s;
  background: #222;
  color: #fff;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
}
#quiz button:hover { transform: scale(1.05); box-shadow: 0 0 12px #fff; }
.correct { background: limegreen !important; color: black; animation: correctFlash 0.5s; }
.wrong { background: red !important; color: white; animation: wrongFlash 0.5s; }
@keyframes correctFlash {0%{transform: scale(1)}50%{transform: scale(1.1)}100%{transform: scale(1)}}
@keyframes wrongFlash {0%{transform: scale(1)}50%{transform: scale(1.1)}100%{transform: scale(1)}}

/* --- İlerleme çubuğu --- */
#progressContainer {
  width: 90%; max-width: 500px; height: 20px;
  background: rgba(255,255,255,0.2); border-radius: 10px; margin: 15px auto;
  overflow: hidden;
}
#progressBar { height:100%; width:0%; background: limegreen; transition: width 0.5s; }

/* --- Sonuç ve Tekrar Dene --- */
#result { margin-top: 20px; font-size: 22px; background: rgba(255,223,0,0.95); color:black; padding:20px; border-radius:25px; box-shadow:0 0 20px rgba(0,0,0,0.5);}
#retryBtn {
  margin-top:15px; padding:12px 30px; font-size:18px;
  border:none; border-radius:25px; cursor:pointer;
  background:#FFD700; color:black; font-weight:bold;
  box-shadow:0 4px 8px rgba(0,0,0,0.3); transition: all 0.2s;
}
#retryBtn:hover { transform:scale(1.05); box-shadow:0 0 12px #fff; }

/* --- Konfeti --- */
.confetti { position: fixed; width:10px; height:10px; top:0; pointer-events:none; animation:fall 1s linear forwards; }
@keyframes fall {0%{transform:translateY(0) rotate(0deg);}100%{transform:translateY(600px) rotate(360deg);opacity:0;}}

/* --- Harita oyunu --- */
#map { position: relative; width: 100%; height: 400px; background:#3498db; border-radius:15px; margin: 20px auto; }
.region { position: absolute; width: 100px; height: 50px; background: rgba(255,255,255,0.8); color:#000; display:flex; justify-content:center; align-items:center; border-radius:10px; cursor:grab; transition: all 0.3s; }
.region.correct { background: limegreen; color:#000; }
.region.wrong { background: red; color:#fff; }

/* --- Bilgi kartı --- */
#infoCard { background:#16a085; padding:20px 25px; border-radius:20px; min-height:100px; font-size:20px; margin-bottom:15px; transition: all 0.5s; }

#infoBtn { padding:12px 30px; font-size:18px; border:none; border-radius:25px; cursor:pointer; background:#f39c12; color:black; font-weight:bold; box-shadow:0 4px 8px rgba(0,0,0,0.3); transition:all 0.2s; }
#infoBtn:hover { transform:scale(1.05); box-shadow:0 0 12px #fff; }

/* --- Ana Sekme --- */
#homeBtn { margin-top:15px; padding:12px 30px; font-size:18px; border:none; border-radius:25px; cursor:pointer; background:#7f8c8d; color:white; font-weight:bold; box-shadow:0 4px 8px rgba(0,0,0,0.3); transition:all 0.2s; }
#homeBtn:hover { transform:scale(1.05); box-shadow:0 0 12px #fff; }
</style>
</head>
<body>

<h1>Izmir Game</h1>

<!-- Giriş menüsü -->
<div id="menu">
  <button id="btn1">1</button>
  <button id="btn2">2</button>
  <button id="btn3">3</button>
</div>

<!-- Oyun alanı -->
<div id="gameContainer" style="display:none;">
  <div id="quiz"></div>
  <div id="progressContainer"><div id="progressBar"></div></div>
  <div id="result"></div>
  
  <div id="map" style="display:none;"></div>
  <button id="mapRetryBtn" style="display:none;">Ana Sekme</button>
  
  <div id="infoCard" style="display:none;"></div>
  <button id="infoBtn" style="display:none;">Bilgi değiştir</button>
  
  <button id="retryBtn" style="display:none;">Tekrar Dene</button>
  <button id="homeBtn" style="display:none;">Ana Sekme</button>
</div>

<script>
// ---------------- Giriş menüsü ----------------
const menu = document.getElementById("menu");
const gameContainer = document.getElementById("gameContainer");
const quizDiv = document.getElementById("quiz");
const progressBar = document.getElementById("progressBar");
const resultDiv = document.getElementById("result");
const retryBtn = document.getElementById("retryBtn");
const homeBtn = document.getElementById("homeBtn");

const btn1 = document.getElementById("btn1");
const btn2 = document.getElementById("btn2");
const btn3 = document.getElementById("btn3");

let currentGame = 0; // 1=quiz,2=map,3=info

btn1.onclick = ()=>{ startQuiz(); };
btn2.onclick = ()=>{ startMap(); };
btn3.onclick = ()=>{ startInfo(); };

// -------------------- OYUN 1: Quiz --------------------
let allQuestions = [
{q:"35 plaka hangi şehir?",answers:["İstanbul","İzmir","Antalya","Bursa"],correct:1},
{q:"İzmir'de simide ne denir?",answers:["Simit","Gevrek","Halka","Çıtır"],correct:1},
{q:"İzmir Saat Kulesi nerede?",answers:["Konak","Alsancak","Buca","Bornova"],correct:0},
{q:"Kordon hangi ilçede?",answers:["Konak","Buca","Bornova","Karabağlar"],correct:0},
{q:"Boyoz genelde neyle yenir?",answers:["Peynir","Yumurta","Zeytin","Domates"],correct:2},
{q:"İzmir'in meşhur sandviçi?",answers:["Kumru","Tost","Döner","Bazlama"],correct:0},
{q:"Gündoğdu Meydanı nerede?",answers:["Karşıyaka","Konak","Bornova","Çeşme"],correct:1},
{q:"Asansör hangi semtte?",answers:["Karataş","Buca","Bornova","Foça"],correct:0},
{q:"Karşıyaka hangi yakada?",answers:["Kuzey","Güney","Doğu","Batı"],correct:0},
{q:"İzmir Fuarı hangi parkta?",answers:["Kültürpark","Gençlik Parkı","Seğmenler","Yıldız"],correct:0}
];

let questions=[], current=0, score=0, answered=false, timePerQuestion=15, timer=null;

function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr;}

function startQuiz(){
  currentGame=1;
  menu.style.display="none";
  gameContainer.style.display="block";
  document.body.style.background="#c0392b"; // kırmızı
  quizDiv.style.display="block";
  progressBar.parentElement.style.display="block";
  retryBtn.style.display="none"; resultDiv.innerHTML="";
  homeBtn.style.display="inline-block";
  questions = allQuestions.sort(()=>Math.random()-0.5).slice(0,10);
  current=0; score=0; showQuestion();
}

function showQuestion(){
  answered=false;
  clearInterval(timer);
  let q=questions[current];
  let options=q.answers.map((a,i)=>({text:a,index:i}));
  options=shuffleArray(options);
  let html="<h2>"+(current+1)+". Soru / 10 - "+q.q+"</h2>";
  options.forEach((o,i)=>{html+=`<button id="btn${i}" onclick="answer(${i},${o.index},${q.correct})">${o.text}</button><br>`;});
  html+=`<p id="time">Kalan süre: ${timePerQuestion}s</p>`;
  quizDiv.innerHTML=html;
  startTimer();
}

function startTimer(){
  let t=timePerQuestion;
  document.getElementById("time").innerText="Kalan süre: "+t+"s";
  timer=setInterval(()=>{
    t--;
    document.getElementById("time").innerText="Kalan süre: "+t+"s";
    if(t<=0){clearInterval(timer);answer(-1,-1,questions[current].correct);}
  },1000);
}

function answer(i, originalIndex, correctIndex){
  if(answered) return;
  answered=true;
  clearInterval(timer);
  let buttons=document.querySelectorAll("#quiz button");
  if(i!==-1 && originalIndex===correctIndex){
    score++;
    document.getElementById("btn"+i).classList.add("correct");
    showConfetti();
    updateProgress();
  } else {
    if(i!==-1) document.getElementById("btn"+i).classList.add("wrong");
    buttons.forEach((b)=>{if(b.innerText===questions[current].answers[correctIndex]) b.classList.add("correct");});
  }
  current++;
  setTimeout(()=>{if(current<questions.length) showQuestion(); else showQuizResult();},1000);
}

function updateProgress(){
  let pct = Math.floor((score/questions.length)*100);
  progressBar.style.width=pct+"%";
}

function showQuizResult(){
  let text="", badge="";
  if(score>=9){text="Mükemmel! Gerçek bir İzmir bilgini."; badge="🏆";}
  else if(score>=7){text="Çok iyi, İzmir’i iyi tanıyorsun."; badge="🥇";}
  else if(score>=5){text="Orta seviye, biraz daha çalışabilirsin."; badge="🥈";}
  else{text="Daha fazla bilgiye ihtiyaç var."; badge="🥉";}
  quizDiv.innerHTML="";
  resultDiv.innerHTML="Sonuç: "+score+"/10 "+badge+"<br>"+text;
  retryBtn.style.display="inline-block";
}

// Tekrar Dene ve Ana Sekme
retryBtn.onclick=startQuiz;
homeBtn.onclick=()=>{
  gameContainer.style.display="none";
  menu.style.display="block";
  quizDiv.style.display="none";
  document.body.style.background="#c0392b";
  progressBar.style.width="0%";
  retryBtn.style.display="none";
  resultDiv.innerHTML="";
  mapDiv.style.display="none";
  infoCard.style.display="none";
};

// -------------------- Konfeti --------------------
function showConfetti(){
  for(let i=0;i<20;i++){
    let c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*window.innerWidth+"px";
    c.style.background=["#FFD700","#FF4500","#00BFFF","#FF69B4"][Math.floor(Math.random()*4)];
    document.body.appendChild(c);
    setTimeout(()=>{c.remove()},1500);
  }
}

// -------------------- OYUN 2: Harita --------------------
const mapDiv=document.getElementById("map");
const mapRetryBtn=document.getElementById("mapRetryBtn");

const regions=["Konak","Karşıyaka","Bornova","Buca","Çeşme","Aliağa","Menemen","Gaziemir","Balçova","Bayraklı"];

function startMap(){
  currentGame=2;
  menu.style.display="none";
  gameContainer.style.display="block";
  quizDiv.style.display="none"; progressBar.parentElement.style.display="block"; progressBar.style.width="0%";
  resultDiv.innerHTML=""; homeBtn.style.display="inline-block";
  document.body.style.background="#27ae60"; // yeşil
  mapDiv.style.display="block"; mapDiv.innerHTML="";
  regions.forEach((r,i)=>{
    let reg=document.createElement("div");
    reg.className="region";
    reg.innerText=r;
    reg.style.left=(i*55% % 400)+"px";
    reg.style.top=(Math.floor(i/4)*60)+"px";
    reg.draggable=true;
    reg.addEventListener("dragstart",(e)=>{e.dataTransfer.setData("text",r);});
    mapDiv.appendChild(reg);
  });
  // basit hedef alanları oluşturabiliriz (temsil için)
  score=0;
  updateProgress();
}

// -------------------- OYUN 3: Bilgi Kartı --------------------
const infoCard=document.getElementById("infoCard");
const infoBtn=document.getElementById("infoBtn");

let infos=[];
for(let i=1;i<=100;i++){infos.push("İzmir hakkında rastgele bilgi #" + i);}

function startInfo(){
  currentGame=3;
  menu.style.display="none";
  gameContainer.style.display="block";
  quizDiv.style.display="none"; progressBar.parentElement.style.display="none";
  mapDiv.style.display="none"; infoCard.style.display="block"; infoBtn.style.display="inline-block"; resultDiv.innerHTML="";
  document.body.style.background="#f39c12"; // turuncu
  showRandomInfo();
}

function showRandomInfo(){
  const idx=Math.floor(Math.random()*infos.length);
  infoCard.innerText=infos[idx];
}
infoBtn.onclick=showRandomInfo;
</script>
</body>
</html>
