<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Gerçek İzmirli misin?</title>
<style>
body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px;
  margin: 0;
  background: linear-gradient(to bottom, #1E90FF, #87CEFA);
  color: #fff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  align-items: center;
}

h1 {
  font-size: 36px;
  color: #FFD700;
  text-shadow: 2px 2px 4px #000;
  margin-bottom: 20px;
}

#score {
  font-size: 22px;
  background: rgba(255, 223, 0, 0.8);
  color: black;
  display: inline-block;
  padding: 8px 16px;
  border-radius: 20px;
  margin-bottom: 20px;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

#quiz button {
  padding: 12px 24px;
  margin: 10px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.2s;
  background: #222;
  color: #fff;
  min-width: 200px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

#quiz button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px #fff;
}

.correct {
  background: limegreen !important;
  color: black;
}

.wrong {
  background: red !important;
  color: white;
}

#result {
  margin-top: 30px;
  font-size: 24px;
  color: #FFD700;
  text-shadow: 1px 1px 2px #000;
}

#retryBtn {
  margin-top: 20px;
  padding: 12px 30px;
  font-size: 18px;
  border: none;
  border-radius: 25px;
  cursor: pointer;
  background: #FFD700;
  color: black;
  font-weight: bold;
  box-shadow: 0 4px 6px rgba(0,0,0,0.3);
  transition: all 0.2s;
}

#retryBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 0 12px #fff;
}

.confetti {
  position: fixed;
  width: 10px;
  height: 10px;
  background: #FFD700;
  top: 0;
  left: 50%;
  pointer-events:none;
  animation: fall 1s linear forwards;
}

@keyframes fall {
  0% { transform: translateY(0) rotate(0deg); }
  100% { transform: translateY(600px) rotate(360deg); opacity: 0; }
}
</style>
</head>
<body>

<h1>Gerçek İzmirli misin?</h1>
<div id="score">0 doğru</div>
<div id="quiz"></div>
<div id="result"></div>
<button id="retryBtn" style="display:none" onclick="restartGame()">Tekrar Dene</button>

<script>
// 50 soruluk havuz (doğru cevap index sabit)
let allQuestions = [
{q:"35 plaka hangi şehir?",answers:["İstanbul","İzmir","Antalya","Bursa"],correct:1},
{q:"İzmir'de simide ne denir?",answers:["Simit","Gevrek","Halka","Çıtır"],correct:1},
{q:"İzmir Saat Kulesi nerede?",answers:["Konak","Alsancak","Buca","Bornova"],correct:0},
{q:"Kordon hangi ilçede?",answers:["Konak","Buca","Bornova","Karabağlar"],correct:0},
{q:"Boyoz genelde neyle yenir?",answers:["Peynir","Yumurta","Zeytin","Domates"],correct:2},
{q:"İzmir'in meşhur sandviçi?",answers:["Kumru","Tost","Döner","Bazlama"],correct:0},
{q:"Gündoğdu Meydanı nerede?",answers:["Karşıyaka","Konak","Bornova","Çeşme"],correct:1},
{q:"Asansör hangi semtte?",answers:["Karataş","Buca","Bornova","Foça"],correct:0},
{q:"Karşıyaka hangi yakada?",answers:["Kuzey","Güney","Doğu","Batı"],correct:0},
{q:"İzmir Fuarı hangi parkta?",answers:["Kültürpark","Gençlik Parkı","Seğmenler","Yıldız"],correct:0}
//... diğer sorular aynı şekilde
];

// Rastgele 10 soru seç
function getRandomQuestions() {
  let shuffled = allQuestions.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, 10);
}

let questions = getRandomQuestions();
let current = 0;
let score = 0;
let answered = false;

function shuffleArray(arr) {
  for(let i=arr.length-1;i>0;i--){
    let j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]]=[arr[j],arr[i]];
  }
  return arr;
}

function showQuestion() {
  answered = false;
  let q = questions[current];
  // Şıkları karıştır
  let options = q.answers.map((a,i)=>({text:a,index:i}));
  options = shuffleArray(options);

  let html = "<h2>"+(current+1)+"/10 - "+q.q+"</h2>";
  options.forEach((o,i)=>{
    html += `<button id="btn${i}" onclick="answer(${i}, ${o.index}, ${q.correct})">${o.text}</button><br>`;
  });
  document.getElementById("quiz").innerHTML = html;
  document.getElementById("result").innerHTML = "";
}

function answer(i, originalIndex, correctIndex) {
  if(answered) return;
  answered = true;
  let correctBtnIndex = null;
  // Doğru cevabın hangi butonda olduğunu bul
  let buttons = document.querySelectorAll("#quiz button");
  buttons.forEach((b,index)=>{
    if(index!==i && originalIndex===correctIndex){
      correctBtnIndex=index;
    }
  });
  if(originalIndex===correctIndex){
    score++;
    document.getElementById("btn"+i).classList.add("correct");
    showConfetti();
  } else {
    document.getElementById("btn"+i).classList.add("wrong");
    // doğru cevabı göster
    buttons.forEach((b,index)=>{
      if(b.innerText===questions[current].answers[correctIndex]){
        b.classList.add("correct");
      }
    });
  }

  current++;
  document.getElementById("score").innerText = score + " doğru";
  setTimeout(()=>{
    if(current < questions.length){
      showQuestion();
    } else {
      showResult();
    }
  },1000);
}

function showResult() {
  let text="";
  if(score>=9) text="Mükemmel! Gerçek bir İzmir bilgini.";
  else if(score>=7) text="Çok iyi, İzmir’i iyi tanıyorsun.";
  else if(score>=5) text="Orta seviye, biraz daha çalışabilirsin.";
  else text="Daha fazla bilgiye ihtiyaç var.";
  
  document.getElementById("quiz").innerHTML = "";
  document.getElementById("result").innerHTML = "Sonuç: "+score+"/10<br>"+text;
  document.getElementById("retryBtn").style.display = "inline-block";
}

function restartGame() {
  questions = getRandomQuestions();
  current = 0;
  score = 0;
  document.getElementById("retryBtn").style.display = "none";
  document.getElementById("score").innerText = "0 doğru";
  showQuestion();
}

function showConfetti(){
  for(let i=0;i<15;i++){
    let c = document.createElement("div")
    c.className="confetti"
    c.style.left = Math.random()*window.innerWidth+"px"
    c.style.background = ["#FFD700","#FF4500","#00BFFF","#FF69B4"][Math.floor(Math.random()*4)]
    document.body.appendChild(c)
    setTimeout(()=>{c.remove()},1200)
  }
}

showQuestion();
</script>
</body>
</html>
