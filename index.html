<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>İzmir Game</title>
<style>
body {
    margin: 0;
    padding: 0;
    background-color: red;
    font-family: Arial, sans-serif;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    height: 100vh;
}

header {
    padding: 20px;
    font-size: 36px;
    font-weight: bold;
}

footer {
    padding: 20px;
}

button {
    padding: 10px 20px;
    margin: 0 10px;
    font-size: 18px;
    cursor: pointer;
}

#gameContainer {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    overflow: auto;
}
</style>
</head>
<body>
<header>İzmir Game</header>

<div id="gameContainer">
    <p>1, 2 veya 3 numaralı butona basın.</p>
</div>

<footer>
    <button onclick="loadGame(1)">1</button>
    <button onclick="loadGame(2)">2</button>
    <button onclick="loadGame(3)">3</button>
</footer>

<script>
function loadGame(number) {
    const container = document.getElementById('gameContainer');
    container.innerHTML = ""; // Önceki içeriği temizle

    if(number === 1) {
        // 1 numaralı butona basınca oyun kodu buraya geliyor
        container.innerHTML = `
        <div style="width:100%;max-width:600px;">
            <h1>Gerçek İzmirli misin?</h1>
            <div id="score">0 doğru</div>
            <div id="progressContainer" style="width:100%;height:20px;background:rgba(255,255,255,0.2);border-radius:10px;margin-bottom:20px;overflow:hidden;">
                <div id="progressBar" style="height:100%;width:0%;background:limegreen;transition:width 0.5s;"></div>
            </div>
            <div id="quiz"></div>
            <div id="result"></div>
            <button id="retryBtn" style="display:none;padding:12px 30px;font-size:18px;border:none;border-radius:25px;cursor:pointer;background:#FFD700;color:black;font-weight:bold;">Tekrar Dene</button>
        </div>

        <script>
        let allQuestions = [
            {q:"35 plaka hangi şehir?",answers:["İstanbul","İzmir","Antalya","Bursa"],correct:1},
            {q:"İzmir'de simide ne denir?",answers:["Simit","Gevrek","Halka","Çıtır"],correct:1},
            {q:"İzmir Saat Kulesi nerede?",answers:["Konak","Alsancak","Buca","Bornova"],correct:0},
            {q:"Kordon hangi ilçede?",answers:["Konak","Buca","Bornova","Karabağlar"],correct:0},
            {q:"Boyoz genelde neyle yenir?",answers:["Peynir","Yumurta","Zeytin","Domates"],correct:2},
            {q:"İzmir'in meşhur sandviçi?",answers:["Kumru","Tost","Döner","Bazlama"],correct:0},
            {q:"Gündoğdu Meydanı nerede?",answers:["Karşıyaka","Konak","Bornova","Çeşme"],correct:1},
            {q:"Asansör hangi semtte?",answers:["Karataş","Buca","Bornova","Foça"],correct:0},
            {q:"Karşıyaka hangi yakada?",answers:["Kuzey","Güney","Doğu","Batı"],correct:0},
            {q:"İzmir Fuarı hangi parkta?",answers:["Kültürpark","Gençlik Parkı","Seğmenler","Yıldız"],correct:0}
        ];

        let questions = allQuestions.sort(()=>Math.random()-0.5).slice(0,10);
        let current=0, score=0, answered=false, timer=null, timePerQuestion=15;

        function shuffleArray(arr){for(let i=arr.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]]}return arr;}

        function showQuestion(){
            answered=false;
            clearInterval(timer);
            let q=questions[current];
            let options=q.answers.map((a,i)=>({text:a,index:i}));
            options=shuffleArray(options);
            let html="<h2>"+(current+1)+". Soru / 10 - "+q.q+"</h2>";
            options.forEach((o,i)=>{html+=\`<button id="btn\${i}" onclick="answer(\${i},\${o.index},\${q.correct})">\${o.text}</button><br>\`;});
            html+=\`<p id="time">Kalan süre: \${timePerQuestion}s</p>\`;
            document.getElementById("quiz").innerHTML=html;
            document.getElementById("result").innerHTML="";
            startTimer();
        }

        function startTimer(){
            let t=timePerQuestion;
            document.getElementById("time").innerText="Kalan süre: "+t+"s";
            timer=setInterval(()=>{
                t--;
                document.getElementById("time").innerText="Kalan süre: "+t+"s";
                if(t<=0){clearInterval(timer);answer(-1,-1,questions[current].correct);}
            },1000);
        }

        function answer(i, originalIndex, correctIndex){
            if(answered) return;
            answered=true;
            clearInterval(timer);
            let buttons=document.querySelectorAll("#quiz button");
            if(i!==-1 && originalIndex===correctIndex){
                score++;
                document.getElementById("btn"+i).classList.add("correct");
                showConfetti();
                updateProgress();
            } else {
                if(i!==-1) document.getElementById("btn"+i).classList.add("wrong");
                buttons.forEach((b)=>{if(b.innerText===questions[current].answers[correctIndex]) b.classList.add("correct");});
            }
            document.getElementById("score").innerText=score+" doğru";
            current++;
            setTimeout(()=>{if(current<questions.length) showQuestion(); else showResult();},1000);
        }

        function updateProgress(){
            let pct = Math.floor((score/questions.length)*100);
            document.getElementById("progressBar").style.width=pct+"%";
        }

        function showResult(){
            let text="", badge="";
            if(score>=9){text="Mükemmel! Gerçek bir İzmir bilgini."; badge="🏆";}
            else if(score>=7){text="Çok iyi, İzmir’i iyi tanıyorsun."; badge="🥇";}
            else if(score>=5){text="Orta seviye, biraz daha çalışabilirsin."; badge="🥈";}
            else{text="Daha fazla bilgiye ihtiyaç var."; badge="🥉";}
            document.getElementById("quiz").innerHTML="";
            document.getElementById("result").innerHTML="Sonuç: "+score+"/10 "+badge+"<br>"+text;
            document.getElementById("retryBtn").style.display="inline-block";
            document.getElementById("progressBar").style.width="100%";
        }

        function restartGame(){
            questions=allQuestions.sort(()=>Math.random()-0.5).slice(0,10);
            current=0; score=0; answered=false;
            document.getElementById("retryBtn").style.display="none";
            document.getElementById("score").innerText="0 doğru";
            document.getElementById("progressBar").style.width="0%";
            showQuestion();
        }

        function showConfetti(){
            for(let i=0;i<20;i++){
                let c=document.createElement("div");
                c.className="confetti";
                c.style.left=Math.random()*window.innerWidth+"px";
                c.style.background=["#FFD700","#FF4500","#00BFFF","#FF69B4"][Math.floor(Math.random()*4)];
                document.body.appendChild(c);
                setTimeout(()=>{c.remove()},1500);
            }
        }

        showQuestion();
        </script>
        `;
    } else {
        container.innerHTML = `<p>${number} numaralı oyun henüz yok.</p>`;
    }
}
</script>
</body>
</html>
